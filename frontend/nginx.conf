server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Legacy tender → proposal 301 redirects. Crawler-friendly (proper
    # HTTP 301, not a JS-side navigate) so Googlebot updates its index.
    # Note: nginx:alpine's envsubst-on-templates.sh runs against .conf files
    # and eats bare ${var} — so avoid `${is_args}`. Also avoid pcre `{N}`
    # quantifiers here for the same reason; a permissive pattern suffices
    # since /tenders/* only matched real UUIDs historically.
    location = /tenders {
        return 301 /;
    }
    location = /tenders/new {
        return 301 /proposal/new;
    }
    location ~ ^/tenders/(.+)$ {
        return 301 /proposal/$1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;
}
