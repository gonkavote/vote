server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Legacy tender → proposal 301 redirects. Crawler-friendly (proper
    # HTTP 301, not a JS-side navigate) so Googlebot updates its index.
    location = /tenders {
        return 301 /;
    }
    location = /tenders/new {
        return 301 /proposal/new$is_args$args;
    }
    location ~ ^/tenders/([a-fA-F0-9-]{36})$ {
        return 301 /proposal/$1$is_args$args;
    }
    location ~ ^/tenders/([a-fA-F0-9-]{36})/(.*)$ {
        return 301 /proposal/$1/$2$is_args$args;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;
}
