services:
  traefik:
    image: traefik:v3.6.2
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.watch=true"
      - "--entrypoints.web.address=:80"
      # TLS is terminated by Cloudflare in front of this server (Flexible SSL).
      # Traefik only listens on plain HTTP; Cloudflare ↔ origin uses Azure
      # backbone, no TLS on the wire here.
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: gonka-vote-clickhouse
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-gonka_vote}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_SKIP_USER_SETUP=1
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./backend/ch_migrations:/docker-entrypoint-initdb.d:ro
      # TTL=3d on system.*_log tables so an empty-volume restart starts
      # right (matches the runtime ALTERs already applied; see file header).
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: gonka-vote-indexer
    environment:
      - RPC_URL=${RPC_URL:?RPC_URL is required — see .env.template}
      - CHAIN_API_URL=${CHAIN_API_URL:?CHAIN_API_URL is required — see .env.template}
      - TRACKER_API_URL=${TRACKER_API_URL:?TRACKER_API_URL is required — see .env.template}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS:?CONTRACT_ADDRESS is required — see .env.template}
      - SCAN_INTERVAL=${SCAN_INTERVAL:-15s}
      - SNAPSHOT_INTERVAL=${SNAPSHOT_INTERVAL:-60s}
      - BALANCE_CONCURRENCY=${BALANCE_CONCURRENCY:-10}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-30s}
      - HEALTH_ADDR=:8080
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DB:-gonka_vote}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gonka-vote-backend
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DB:-gonka_vote}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CHAIN_ID=${CHAIN_ID:?CHAIN_ID is required — see .env.template}
      # Indexer-facing URLs (fallback when BACKEND_*_URL is empty).
      - CHAIN_API_URL=${CHAIN_API_URL:?CHAIN_API_URL is required}
      - RPC_URL=${RPC_URL:?RPC_URL is required}
      # Backend-facing chain endpoints. Optional — if empty the backend
      # falls back to CHAIN_API_URL / RPC_URL. Set them when the indexer
      # node and the broadcast/proxy node should differ (e.g. the indexer
      # needs tx_search support but broadcasts go to a faster node).
      - BACKEND_CHAIN_API_URL=${BACKEND_CHAIN_API_URL:-}
      - BACKEND_RPC_URL=${BACKEND_RPC_URL:-}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS:?CONTRACT_ADDRESS is required}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required — generate with `openssl rand -hex 32`}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required, e.g. https://your-domain.example}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-["https://localhost"]}
      - TRANSLATION_LANGUAGES=${TRANSLATION_LANGUAGES:-en,ru}
      - TRACKER_API_URL=${TRACKER_API_URL:?TRACKER_API_URL is required}
      # Tracker UI base ("" disables explorer links in the SPA).
      - TRACKER_UI_URL=${TRACKER_UI_URL:-}
      # WalletConnect projectId from https://cloud.reown.com/
      # ("" disables the in-app wallet flow).
      - WC_PROJECT_ID=${WC_PROJECT_ID:-}
      - GOVERNANCE_POLL_INTERVAL=${GOVERNANCE_POLL_INTERVAL:-60}
      - GOVERNANCE_LIST_TTL=${GOVERNANCE_LIST_TTL:-300}
      - GOVERNANCE_DETAIL_TTL=${GOVERNANCE_DETAIL_TTL:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vote-backend.rule=Host(`${PUBLIC_HOST:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.vote-backend.entrypoints=web"
      - "traefik.http.routers.vote-backend.priority=100"
      - "traefik.http.services.vote-backend.loadbalancer.server.port=8000"
      # Bot/crawler interception: search engines (Googlebot, Bingbot,
      # YandexBot, …) and social-card fetchers (Twitterbot,
      # facebookexternalhit, LinkedInBot, TelegramBot, WhatsApp preview,
      # Slackbot, Discordbot, …) get routed to FastAPI for /, /tenders/{uuid},
      # /governance and /governance/{id}, where we render real titles +
      # descriptions + body from the DB. Real browsers keep going to the SPA.
      - "traefik.http.routers.vote-backend-og.rule=Host(`${PUBLIC_HOST:-localhost}`) && PathRegexp(`^/$|^/tenders/[a-fA-F0-9-]{36}$|^/governance(/[0-9]+)?$`) && HeaderRegexp(`User-Agent`, `(?i).*(bot|crawler|spider|facebookexternalhit|telegrambot|whatsapp|slackbot|discordbot|preview|embed|skype|bingpreview|outbrain|pinterest|google|baidu|yandex|duckduckgo|qwant|petalbot|seznambot|applebot).*`)"
      - "traefik.http.routers.vote-backend-og.entrypoints=web"
      - "traefik.http.routers.vote-backend-og.priority=200"
      - "traefik.http.routers.vote-backend-og.service=vote-backend"
      # /sitemap.xml goes straight to FastAPI for everyone (not UA-gated):
      # Googlebot fetches it on its own and we want the dynamic version.
      - "traefik.http.routers.vote-backend-sitemap.rule=Host(`${PUBLIC_HOST:-localhost}`) && Path(`/sitemap.xml`)"
      - "traefik.http.routers.vote-backend-sitemap.entrypoints=web"
      - "traefik.http.routers.vote-backend-sitemap.priority=210"
      - "traefik.http.routers.vote-backend-sitemap.service=vote-backend"

  translator:
    # Same image as backend (shares the `backend` package); just a different
    # entrypoint. Polls translation_jobs in ClickHouse and writes translated
    # text into tenders.*_t / comments.body_t. Not exposed to traefik.
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gonka-vote-translator
    command: python -m backend.translator
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DB:-gonka_vote}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - GEMINI_API_KEY_1=${GEMINI_API_KEY_1:-}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2:-}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3:-}
      - TRANSLATION_LANGUAGES=${TRANSLATION_LANGUAGES:-en,ru}
      - TRANSLATION_POLL_INTERVAL=${TRANSLATION_POLL_INTERVAL:-5}
      - TRANSLATION_MAX_ATTEMPTS=${TRANSLATION_MAX_ATTEMPTS:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  notifier:
    # Same image as backend; entrypoint is `python -m backend.notifier`.
    # Polls notification_jobs and sends Telegram bot messages via Bot API.
    # Not exposed to traefik.
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gonka-vote-notifier
    command: python -m backend.notifier
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DB:-gonka_vote}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      - NOTIFICATION_POLL_INTERVAL=${NOTIFICATION_POLL_INTERVAL:-5}
      - NOTIFICATION_MAX_ATTEMPTS=${NOTIFICATION_MAX_ATTEMPTS:-3}
      - NOTIFICATION_RETRY_DELAY_SEC=${NOTIFICATION_RETRY_DELAY_SEC:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gonka-vote-frontend
    depends_on:
      - backend
    healthcheck:
      # Use 127.0.0.1 explicitly: busybox wget tries IPv6 first when given
      # `localhost`, but our nginx only listens on IPv4 :80.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vote-frontend.rule=Host(`${PUBLIC_HOST:-localhost}`)"
      - "traefik.http.routers.vote-frontend.entrypoints=web"
      - "traefik.http.routers.vote-frontend.priority=1"
      - "traefik.http.services.vote-frontend.loadbalancer.server.port=80"

volumes:
  clickhouse-data:
  clickhouse-logs:
